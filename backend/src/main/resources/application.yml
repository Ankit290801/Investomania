spring:
  application:
    name: investment-tracker
  profiles:
    active: ${ACTIVE_PROFILE:dev}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-secret-key-change-in-production-min-256-bits-required}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

app:
  config:
    tax-rules-file: classpath:config/tax-rules.yml
    api-config-file: classpath:config/api-config.yml
    currency-config-file: classpath:config/currency-config.yml
    business-rules-file: classpath:config/business-rules.yml

market-data:
  scheduler:
    enabled: ${MARKET_DATA_SCHEDULER_ENABLED:true}
    cron: ${MARKET_DATA_SCHEDULER_CRON:0 0 18 * * ?}  # 6:00 PM daily
    batch-size: ${MARKET_DATA_BATCH_SIZE:50}
    batch-delay-ms: ${MARKET_DATA_BATCH_DELAY:2000}  # 2 seconds between batches
