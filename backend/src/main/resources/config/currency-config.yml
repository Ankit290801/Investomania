currencies:
  supported:
    - code: INR
      symbol: ₹
      name: Indian Rupee
      locale: en-IN
      decimal-places: 2
    
    - code: USD
      symbol: $
      name: US Dollar
      locale: en-US
      decimal-places: 2
    
    - code: EUR
      symbol: €
      name: Euro
      locale: en-EU
      decimal-places: 2
    
    - code: GBP
      symbol: £
      name: British Pound
      locale: en-GB
      decimal-places: 2
  
  default-currency: INR
  
  conversion:
    auto-update: true
    update-time: "00:00:00"  # Daily at midnight
    cache-duration-hours: 24
    fallback-to-manual: true
